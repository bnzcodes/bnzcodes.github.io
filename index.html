<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German N-V Verbindungen Master</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --light: #f8f9fa;
            --success: #27ae60;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #dfe6e9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        header {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .container {
            width: 95%;
            max-width: 900px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-mode {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-mode.active {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        .btn-shuffle {
            background: #6c5ce7;
            color: white;
        }

        /* Flashcard Styles */
        #flashcard-container {
            perspective: 1000px;
            height: 350px;
            cursor: pointer;
            display: none;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-radius: 20px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 20px;
            background: white;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #f1f2f6;
            border: 3px solid var(--secondary);
        }

        .card-face h2 {
            color: var(--primary);
            font-size: 2rem;
            margin: 10px 0;
        }

        .card-face p {
            color: #636e72;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .translation {
            color: var(--accent) !important;
            font-weight: bold;
            font-size: 1.4rem !important;
            margin-top: 20px !important;
            text-transform: none !important;
        }

        /* Quiz Styles */
        #quiz-container {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .quiz-question {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: var(--light);
            text-align: left;
            padding: 18px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .option-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e0;
        }

        .correct {
            background: var(--success) !important;
            color: white;
            border-color: var(--success);
        }

        .wrong {
            background: var(--accent) !important;
            color: white;
            border-color: var(--accent);
        }

        /* Search List */
        #list-container {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 15px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0;
            background: white;
            padding: 15px;
            border-radius: 12px;
        }

        #progress-bar {
            width: 100%;
            height: 8px;
            background: #dfe6e9;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%;
            transition: width 0.4s ease;
        }
    </style>
</head>

<body>

    <header>
        <h1>German Nomen-Verb Verbindungen (139 total)</h1>
    </header>

    <div class="container">
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>

        <div class="nav-buttons">
            <button onclick="showMode('flash')" id="btn-flash" class="btn-mode active">Flashcards</button>
            <button onclick="showMode('quiz')" id="btn-quiz" class="btn-mode">Quiz</button>
            <button onclick="showMode('list')" id="btn-list" class="btn-mode">Search List</button>
            <button onclick="shuffleData()" class="btn-shuffle">Shuffle List 🔀</button>
        </div>

        <!-- Flashcards -->
        <div id="flashcard-container" onclick="flipCard()">
            <div class="card" id="card-element">
                <div class="card-face card-front">
                    <p>Nomen-Verb-Verbindung</p>
                    <h2 id="card-verbindung">...</h2>
                </div>
                <div class="card-face card-back">
                    <p>Bedeutung</p>
                    <h2 id="card-bedeutung">...</h2>
                    <p class="translation" id="card-translation">...</p>
                </div>
            </div>
        </div>

        <!-- Quiz -->
        <div id="quiz-container">
            <div class="quiz-question" id="quiz-q">?</div>
            <div class="options-grid" id="quiz-options"></div>
        </div>

        <!-- List View -->
        <div id="list-container">
            <input type="text" class="search-box" id="search-input" placeholder="Search German or English..."
                onkeyup="filterList()">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Verbindung</th>
                        <th>Bedeutung / Übersetzung</th>
                    </tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>

        <div class="controls" id="general-controls">
            <button onclick="prevItem()" style="background: #636e72; color: white;">← Prev</button>
            <span id="counter" style="font-weight: bold; font-size: 1.2rem;">1 / 139</span>
            <button onclick="nextItem()" style="background: var(--primary); color: white;">Next →</button>
        </div>
    </div>

        let data = [...fullData];
        let currentIndex = 0;
        let currentMode = 'flash';

        function shuffleData() {
            data.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            refreshDisplay();
            alert("List Shuffled!");
        }

        function showMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('flashcard-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('list-container').style.display = 'none';
            document.getElementById('general-controls').style.display = (mode === 'list') ? 'none' : 'flex';

            if (mode === 'flash') {
                document.getElementById('flashcard-container').style.display = 'block';
                document.getElementById('btn-flash').classList.add('active');
                renderFlashcard();
            } else if (mode === 'quiz') {
                document.getElementById('quiz-container').style.display = 'block';
                document.getElementById('btn-quiz').classList.add('active');
                renderQuiz();
            } else {
                document.getElementById('list-container').style.display = 'block';
                document.getElementById('btn-list').classList.add('active');
                renderList();
            }
            updateProgress();
        }

        function renderFlashcard() {
            const item = data[currentIndex];
            document.getElementById('card-element').classList.remove('is-flipped');
            document.getElementById('card-verbindung').innerText = item.v;
            document.getElementById('card-bedeutung').innerText = item.b;
            document.getElementById('card-translation').innerText = item.t;
            updateCounter();
        }

        function flipCard() {
            document.getElementById('card-element').classList.toggle('is-flipped');
        }

        function renderQuiz() {
            const item = data[currentIndex];
            document.getElementById('quiz-q').innerText = `Was bedeutet: "${item.v}"?`;

            let options = [item.b];
            while (options.length < 4) {
                let randomItem = fullData[Math.floor(Math.random() * fullData.length)].b;
                if (!options.includes(randomItem)) options.push(randomItem);
            }
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('quiz-options');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, item.b, btn);
                grid.appendChild(btn);
            });
            updateCounter();
        }

        function checkAnswer(selected, correct, btn) {
            if (selected === correct) {
                btn.classList.add('correct');
                setTimeout(nextItem, 800);
            } else {
                btn.classList.add('wrong');
            }
        }

        function renderList() {
            const body = document.getElementById('list-body');
            body.innerHTML = '';
            fullData.forEach(item => {
                const row = `<tr><td><strong>${item.v}</strong></td><td>${item.b}<br><span style="color:var(--accent)">${item.t}</span></td></tr>`;
                body.innerHTML += row;
            });
        }

        function filterList() {
            let input = document.getElementById('search-input').value.toLowerCase();
            let rows = document.getElementById('list-body').getElementsByTagName('tr');
            for (let row of rows) {
                row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }

        function nextItem() {
            if (currentIndex < data.length - 1) {
                currentIndex++;
                refreshDisplay();
            } else {
                alert("End of list reached!");
            }
        }

        function prevItem() {
            if (currentIndex > 0) {
                currentIndex--;
                refreshDisplay();
            }
        }

        function refreshDisplay() {
            if (currentMode === 'flash') renderFlashcard();
            if (currentMode === 'quiz') renderQuiz();
            updateProgress();
        }

        function updateCounter() {
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${data.length}`;
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / data.length) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        showMode('flash');
    </script>

</body>

</html>
